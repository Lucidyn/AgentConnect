services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentconnect
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentconnect"]
      interval: 5s
      timeout: 3s
      retries: 10

  api: &api_service
    build: .
    expose:
      - "8000"
    environment: &api_env
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentconnect
      - DISTRIBUTED_WORKERS=true
      - WORKER_AGENTS=Research,Coder,Writer,Analyst,Translator,Reviewer,TestRunner
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - API_KEY=${API_KEY:-}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - API_REPLICA_ID=api-1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./plugins:/app/plugins
      - app_data:/app/data
    command: python -m backend.run
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-replica-2:
    <<: *api_service
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - DATABASE_URL=postgresql://agent:agent@postgres:5432/agentconnect
      - DISTRIBUTED_WORKERS=true
      - WORKER_AGENTS=Research,Coder,Writer,Analyst,Translator,Reviewer,TestRunner
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - API_KEY=${API_KEY:-}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-120}
      - API_REPLICA_ID=api-2

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      api-replica-2:
        condition: service_healthy

  worker-research:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - WORKER_MODE=true
      - WORKER_AGENT_NAME=Research
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    command: python -m backend.worker.run

  worker-coder:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - WORKER_MODE=true
      - WORKER_AGENT_NAME=Coder
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    command: python -m backend.worker.run

  worker-reviewer:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - WORKER_MODE=true
      - WORKER_AGENT_NAME=Reviewer
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    command: python -m backend.worker.run

volumes:
  redis_data:
  pg_data:
  app_data:
