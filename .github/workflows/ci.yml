name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import smoke check
        run: python -c "from backend.app import app; assert app.title"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-connect:test .

      - name: Smoke test container
        run: |
          docker run -d --name ac-smoke -p 18000:8000 \
            -e USE_REDIS=false \
            -e USE_QDRANT=false \
            agent-connect:test
          sleep 5
          docker exec ac-smoke python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
          docker stop ac-smoke
