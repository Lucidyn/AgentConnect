name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          REDIS_URL: redis://localhost:6379/0
          USE_REDIS: "false"
        run: pytest tests/ -q --cov=backend --cov-report=term-missing --cov-fail-under=55

      - name: Run Redis integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -q -m redis

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-connect:test .

      - name: Smoke test container
        run: |
          docker run -d --name ac-smoke -p 18000:8000 \
            -e USE_REDIS=false \
            -e USE_QDRANT=false \
            agent-connect:test
          sleep 5
          docker exec ac-smoke python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
          docker stop ac-smoke
